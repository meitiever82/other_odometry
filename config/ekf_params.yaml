# Bloesch EKF 参数

ekf:
  # 重力 (m/s^2)
  gravity: [0.0, 0.0, -9.81]

  # IMU 噪声参数
  accel_noise: 0.1            # m/s^2
  gyro_noise: 0.01            # rad/s
  accel_bias_walk: 0.0
  gyro_bias_walk: 0.001       # rad/s/sqrt(s)

  # 足端位置过程噪声
  foot_contact_noise: 0.002   # m/sqrt(s)  着地时
  foot_swing_noise: 1.0       # m/sqrt(s)  腾空时

  # FK 观测噪声
  fk_position_noise: 0.005

  # ZUPT 速度约束噪声 (接触脚世界速度 ≈ 0)
  zupt_noise: 0.03

  # 速度 bias 随机游走 (Leg-KILO style)
  vel_bias_walk: 0.001

  # 平面运动约束 (机器人在平地行走, Z 方向几乎不动)
  # σ=0.001 把 Z 钉在 ±2mm，物理上不诚实但避免 IMU 在 Z 上漂移；
  # office/平地场景下 Z 不重要，drift 才是大头。
  # 上下坡/楼梯场景需要放大到 0.005 或 0.01。
  flat_vz_noise: 0.001        # m/s, Z 速度 ≈ 0
  flat_z_noise: 0.001         # m, Z 位置 ≈ 初始高度

  # 初始协方差
  init_pos_std: 0.01          # m
  init_vel_std: 0.01          # m/s
  init_rot_std: 0.01          # rad
  init_accel_bias_std: 0.0    # m/s^2 (锁定)
  init_gyro_bias_std: 0.0     # rad/s (锁定)
  init_foot_std: 0.01         # m

contact:
  # 接触检测参数
  effort_threshold: 5.0       # Nm, 踝关节力矩阈值
  hysteresis: 1.0             # Nm, 滞后量 (上阈值=threshold+hyst, 下阈值=threshold-hyst)
  effort_joint_left: LJPITCH  # 左脚接触检测用的关节
  effort_joint_right: RJPITCH # 右脚接触检测用的关节
  # blackout 保护: |eff_l|=|eff_r|=0 持续 N 秒后强制双脚 contact 让 ZUPT 兜底,
  # 防止 effort 信号失效时 ESKF 速度自由积分跑飞 (=0 关掉这个保护)。
  # 真实数据 (rosbag2_2026_04_07-16_12_13 后半段) 已观察到 effort 整段为 0 的情况。
  blackout_threshold: 0.5     # s

smoother:
  # GTSAM 后端 bias_walk (与前端 ekf.{accel,gyro}_bias_walk 不同)
  # 前端通常把 accel bias 锁住 (0)，因为前端无法观测它；
  # 后端看多个 keyframe，可以让 bias 慢慢 walk 然后被 IMU factor 校正回来。
  accel_bias_walk: 0.005      # m/s^2/sqrt(s)
  gyro_bias_walk:  0.002      # rad/s/sqrt(s)

kinematics:
  # URDF 路径
  urdf_path: ""               # 空则从 /robot_description 参数获取
  # 足端 link 名
  left_foot_link: left_leg_ankle_roll_link
  right_foot_link: right_leg_ankle_roll_link
  base_link: base_link
